services:
  - type: web
    name: studytube-ai-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_TRANSCRIPTION_MODEL
        value: whisper-large-v3-turbo
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_CURRENCY
        value: INR
      - key: RAZORPAY_PRO_AMOUNT
        value: 29900
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: OWNER_PRO_EMAILS
        sync: false
      - key: YOUTUBE_USER_AGENT
        value: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36
      - key: YOUTUBE_COOKIE
        sync: false
      - key: FIREBASE_NOTES_FUNCTION_URL
        sync: false
      - key: FIREBASE_NOTES_SHARED_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://studytube-ai-frontend.onrender.com

  - type: web
    name: studytube-ai-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        value: https://studytube-ai-backend.onrender.com
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
